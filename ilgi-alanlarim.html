    },
    {
        name: "The Power of Your Subconscious Mind",
        img: "https://m.media-amazon.com/images/I/81gTwYAhU7L.jpg"
    }
];

let output = "";

books.forEach(book => {
    output += `
    <div class="col-md-4 mt-4">
        <div class="card h-100 text-center">
            <img src="${book.img}" class="book-img" alt="${book.name}">
            <div class="card-body">
                <h5>${book.name}</h5>
            </div>
        </div>
    </div>
    `;
});

document.getElementById("books").innerHTML = output;

fetch("https://www.googleapis.com/books/v1/volumes?q=books")
.then(response => response.json())
.then(data => console.log("API verisi alındı:", data));
