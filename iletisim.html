<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">İletişim Formu</h2>

    <form id="contactForm" action="iletisim.php" method="POST">

        <div class="mb-3">
            <label>Ad Soyad</label>
            <input type="text" id="name" name="name" class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="text" id="email" name="email" class="form-control">
        </div>

        <div class="mb-3">
            <label>Telefon</label>
            <input type="text" id="phone" name="phone" class="form-control">
        </div>

        <div class="mb-3">
            <label>Cinsiyet</label><br>
            <input type="radio" name="gender" value="Kadın"> Kadın
            <input type="radio" name="gender" value="Erkek"> Erkek
        </div>

        <div class="mb-3">
            <label>Hobiler</label><br>
            <input type="checkbox" name="hobby[]" value="Kitap"> Kitap
            <input type="checkbox" name="hobby[]" value="Müzik"> Müzik
            <input type="checkbox" name="hobby[]" value="Spor"> Spor
        </div>

        <div class="mb-3">
            <label>Mesaj</label>
            <textarea id="message" name="message" class="form-control"></textarea>
        </div>

        <button type="submit" class="btn pink-btn">Gönder</button>

    </form>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;

    if(name === "" || email === "" || phone === ""){
        alert("Tüm alanları doldurun!");
        e.preventDefault();
    }

    if(!email.includes("@")){
        alert("Geçerli email giriniz!");
        e.preventDefault();
    }

    if(isNaN(phone)){
        alert("Telefon sadece rakam olmalı!");
        e.preventDefault();
    }

});
</script>

</body>
</html>
