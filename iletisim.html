<div class="container mt-5">
    <h2 class="text-center mb-4">İletişim Formu</h2>

    <div id="jsErrors" class="alert alert-danger d-none"></div>
    <div id="vueErrors" class="alert alert-warning d-none"></div>

    <form id="contactForm" action="iletisim.php" method="POST">

        <input type="text" id="name" name="name" class="form-control mb-2" placeholder="Ad Soyad">

        <input type="text" id="email" name="email" class="form-control mb-2" placeholder="Email">

        <input type="text" id="phone" name="phone" class="form-control mb-2" placeholder="Telefon">

        <div class="mb-2">
            <label>Cinsiyet</label><br>
            <input type="radio" name="gender" value="Kadın"> Kadın
            <input type="radio" name="gender" value="Erkek"> Erkek
        </div>

        <div class="mb-2">
            <label>Şehir</label>
            <select id="sehir" name="sehir" class="form-select">
                <option value="">Seçiniz</option>
                <option>İstanbul</option>
                <option>Ankara</option>
                <option>Sakarya</option>
                <option>İzmir</option>
            </select>
        </div>

        <textarea id="message" name="message" class="form-control mb-2" placeholder="Mesaj"></textarea>

        <div class="d-flex gap-3">

            <!-- Native JS -->
            <button type="button" class="btn btn-primary" onclick="jsValidate()">
                🔵 JS Gönder
            </button>

            <!-- Vue -->
            <button type="button" class="btn btn-success" @click="vueValidate">
                🟢 Vue Gönder
            </button>

            <button type="reset" class="btn btn-secondary">Temizle</button>
        </div>

    </form>
</div>

</div>

<footer class="text-white text-center p-3 mt-5" style="background:#222;">
    © 2026 Nebe Şırgat
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>

<script>
// =====================
// Native JS Validation
// =====================
function jsValidate() {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const message = document.getElementById("message").value.trim();
    const sehir = document.getElementById("sehir").value;
    const gender = document.querySelector('input[name="gender"]:checked');

    let errors = [];
    let errorDiv = document.getElementById("jsErrors");

    document.getElementById("vueErrors").classList.add("d-none");
    errorDiv.classList.add("d-none");

    if (name === "") errors.push("Ad boş");
    if (email === "" || !email.includes("@")) errors.push("Email hatalı");
    if (phone === "" || isNaN(phone)) errors.push("Telefon hatalı");
    if (!gender) errors.push("Cinsiyet seç");
    if (sehir === "") errors.push("Şehir seç");
    if (message === "") errors.push("Mesaj boş");

    if (errors.length > 0) {
        errorDiv.innerHTML = "<ul>" + errors.map(e => `<li>${e}</li>`).join("") + "</ul>";
        errorDiv.classList.remove("d-none");
    } else {
        document.getElementById("contactForm").submit();
    }
}

// =====================
// Vue App
// =====================
const { createApp } = Vue;

createApp({
    methods: {
        vueValidate() {

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const message = document.getElementById("message").value.trim();
            const sehir = document.getElementById("sehir").value;
            const gender = document.querySelector('input[name="gender"]:checked');

            let errors = [];
            let errorDiv = document.getElementById("vueErrors");

            document.getElementById("jsErrors").classList.add("d-none");
            errorDiv.classList.add("d-none");

            if (name === "") errors.push("Ad boş");
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.push("Email hatalı");
            if (!/^\d{10,11}$/.test(phone)) errors.push("Telefon hatalı");
            if (!gender) errors.push("Cinsiyet seç");
            if (sehir === "") errors.push("Şehir seç");
            if (message === "") errors.push("Mesaj boş");

            if (errors.length > 0) {
                errorDiv.innerHTML = "<ul>" + errors.map(e => `<li>${e}</li>`).join("") + "</ul>";
                errorDiv.classList.remove("d-none");
            } else {
                document.getElementById("contactForm").submit();
            }
        }
    }
}).mount("#app");

</script>
