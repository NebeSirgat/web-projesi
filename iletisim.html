<!-- Vue app div -->
<div id="app">
<div class="container mt-5">
    <h2 class="text-center mb-4">İletişim Formu</h2>

    <!-- Hata mesajları -->
    <div id="jsErrors" class="alert alert-danger d-none mb-3"></div>
    <div id="vueErrors" class="alert alert-warning d-none mb-3"></div>
    <div id="successMsg" class="alert alert-success d-none mb-3">✅ Form başarıyla gönderildi!</div>

    <form id="contactForm" action="iletisim.php" method="POST">

        <!-- Ad Soyad -->
        <div class="mb-3">
            <label for="name" class="form-label">Ad Soyad</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="Adınızı giriniz">
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="text" id="email" name="email" class="form-control" placeholder="Email adresinizi giriniz">
        </div>

        <!-- Telefon -->
        <div class="mb-3">
            <label for="phone" class="form-label">Telefon</label>
            <input type="text" id="phone" name="phone" class="form-control" placeholder="Telefon numaranızı giriniz">
        </div>

        <!-- Cinsiyet -->
        <div class="mb-3">
            <label class="form-label">Cinsiyet</label><br>
            <input type="radio" name="gender" value="Kadın" id="kadin">
            <label for="kadin" class="me-3">Kadın</label>
            <input type="radio" name="gender" value="Erkek" id="erkek">
            <label for="erkek">Erkek</label>
        </div>

        <!-- Hobiler -->
        <div class="mb-3">
            <label class="form-label">Hobiler</label><br>
            <input type="checkbox" name="hobby[]" value="Kitap" id="kitap">
            <label for="kitap" class="me-3">Kitap</label>
            <input type="checkbox" name="hobby[]" value="Müzik" id="muzik">
            <label for="muzik" class="me-3">Müzik</label>
            <input type="checkbox" name="hobby[]" value="Spor" id="spor">
            <label for="spor">Spor</label>
        </div>

        <!-- Şehir (Select) -->
        <div class="mb-3">
            <label for="sehir" class="form-label">Şehir</label>
            <select id="sehir" name="sehir" class="form-select">
                <option value="">-- Şehir Seçiniz --</option>
                <option value="İstanbul">İstanbul</option>
                <option value="Ankara">Ankara</option>
                <option value="Sakarya">Sakarya</option>
                <option value="İzmir">İzmir</option>
                <option value="Diğer">Diğer</option>
            </select>
        </div>

        <!-- Mesaj -->
        <div class="mb-3">
            <label for="message" class="form-label">Mesaj</label>
            <textarea id="message" name="message" class="form-control" rows="4" placeholder="Mesajınızı giriniz"></textarea>
        </div>

        <!-- İki Farklı Buton -->
        <div class="d-flex gap-3 flex-wrap">
            <!-- Buton 1: Native JavaScript ile denetim -->
            <button type="button" class="btn btn-primary" onclick="jsValidate()">
                🔵 Gönder (Native JS)
            </button>

            <!-- Buton 2: Vue.js ile denetim -->
            <button type="button" class="btn btn-success" @click="vueValidate">
                🟢 Gönder (Vue.js)
            </button>

            <!-- Reset -->
            <button type="reset" class="btn btn-secondary">Temizle</button>
        </div>

    </form>
</div>
</div><!-- end #app -->

<footer class="text-white text-center p-3 mt-5" style="background:#222;">
    © 2026 Nebe Şırgat
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Vue 3 -->
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>

<script>
    // =====================
    // BUTON 1: Native JavaScript Doğrulama
    // =====================
    function jsValidate() {
        const name    = document.getElementById("name").value.trim();
        const email   = document.getElementById("email").value.trim();
        const phone   = document.getElementById("phone").value.trim();
        const message = document.getElementById("message").value.trim();
        const sehir   = document.getElementById("sehir").value;

        const errorDiv   = document.getElementById("jsErrors");
        const successDiv = document.getElementById("successMsg");
        errorDiv.classList.add("d-none");
        successDiv.classList.add("d-none");

        let errors = [];

        if (name === "")    errors.push("Ad Soyad boş bırakılamaz.");
        if (email === "")   errors.push("Email boş bırakılamaz.");
        else if (!email.includes("@") || !email.includes("."))
                            errors.push("Geçerli bir email adresi giriniz.");
        if (phone === "")   errors.push("Telefon boş bırakılamaz.");
        else if (isNaN(phone) || phone.length < 10)
                            errors.push("Telefon sadece rakamlardan oluşmalı ve en az 10 haneli olmalıdır.");
        if (sehir === "")   errors.push("Lütfen bir şehir seçiniz.");
        if (message === "") errors.push("Mesaj boş bırakılamaz.");

        const genderChecked = document.querySelector('input[name="gender"]:checked');
        if (!genderChecked) errors.push("Lütfen cinsiyet seçiniz.");

        if (errors.length > 0) {
            errorDiv.innerHTML = "<strong>🔵 Native JS Hataları:</strong><ul>"
                + errors.map(e => `<li>${e}</li>`).join("") + "</ul>";
            errorDiv.classList.remove("d-none");
        } else {
            successDiv.innerHTML = "✅ Native JS: Form doğrulandı! Gönderiliyor...";
            successDiv.classList.remove("d-none");
            // Gerçek gönderim
            document.getElementById("contactForm").submit();
        }
    }

    // =====================
    // BUTON 2: Vue.js Doğrulama
    // =====================
    const { createApp } = Vue;
    createApp({
        methods: {
            vueValidate() {
                const name    = document.getElementById("name").value.trim();
                const email   = document.getElementById("email").value.trim();
                const phone   = document.getElementById("phone").value.trim();
                const message = document.getElementById("message").value.trim();
                const sehir   = document.getElementById("sehir").value;

                const errorDiv   = document.getElementById("vueErrors");
                const successDiv = document.getElementById("successMsg");
                errorDiv.classList.add("d-none");
                successDiv.classList.add("d-none");

                let errors = [];

                if (name === "")
                    errors.push("Ad Soyad boş bırakılamaz.");
                if (email === "")
                    errors.push("Email boş bırakılamaz.");
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
                    errors.push("Geçerli bir email formatı giriniz (örn: abc@mail.com).");
                if (phone === "")
                    errors.push("Telefon boş bırakılamaz.");
                else if (!/^\d{10,11}$/.test(phone))
                    errors.push("Telefon sadece rakam içermeli ve 10-11 haneli olmalıdır.");
                if (sehir === "")
                    errors.push("Lütfen bir şehir seçiniz.");
                if (message === "")
                    errors.push("Mesaj alanı boş bırakılamaz.");

                const genderChecked = document.querySelector('input[name="gender"]:checked');
                if (!genderChecked)
                    errors.push("Lütfen cinsiyet seçiniz.");

                if (errors.length > 0) {
                    errorDiv.innerHTML = "<strong>🟢 Vue.js Hataları:</strong><ul>"
                        + errors.map(e => `<li>${e}</li>`).join("") + "</ul>";
                    errorDiv.classList.remove("d-none");
                } else {
                    successDiv.innerHTML = "✅ Vue.js: Form doğrulandı! Gönderiliyor...";
                    successDiv.classList.remove("d-none");
                    document.getElementById("contactForm").submit();
                }
            }
        }
    }).mount("#app");
</script>
</body>
